name: Deploy to OVH

# Flux complet :
#   1. Push sur master
#   2. GitHub Actions : validation + build des assets (Tailwind, asset-map)
#   3. Envoi des assets compilés via SCP au serveur OVH
#   4. Exécution de scripts/deploy.sh sur le serveur (sans build assets)
#
# Secrets GitHub requis :
#   OVH_SSH_HOST     — adresse SSH du serveur OVH
#   OVH_SSH_USER     — utilisateur SSH
#   OVH_SSH_PASSWORD — mot de passe SSH
#   OVH_DEPLOY_PATH  — chemin absolu du projet sur le serveur

on:
  push:
    branches:
      - master

env:
  DB_USER: ci
  DB_PASSWORD: ci
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_NAME: ci_db
  DB_VERSION: mariadb-10.11.2

jobs:
  pre-deploy-check:
    name: Pre-deploy validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl-icu, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint Twig
        run: php bin/console lint:twig templates/ --env=dev

      - name: Lint Container
        run: php bin/console lint:container --env=dev


  deploy:
    name: Deploy to OVH via SSH
    needs: pre-deploy-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl-icu
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: APP_ENV=prod composer install --no-dev --prefer-dist --no-progress --ignore-platform-req=ext-redis

      - name: Build Tailwind CSS
        run: APP_ENV=prod php bin/console tailwind:build --minify

      - name: Compile assets
        run: APP_ENV=prod php bin/console asset-map:compile

      - name: Upload assets to OVH via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVH_SSH_HOST }}
          username: ${{ secrets.OVH_SSH_USER }}
          password: ${{ secrets.OVH_SSH_PASSWORD }}
          source: "public/assets/*"
          target: ${{ secrets.OVH_DEPLOY_PATH }}

      - name: Run deploy script via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_SSH_HOST }}
          username: ${{ secrets.OVH_SSH_USER }}
          password: ${{ secrets.OVH_SSH_PASSWORD }}
          script: |
            cd ${{ secrets.OVH_DEPLOY_PATH }}
            bash scripts/deploy.sh
