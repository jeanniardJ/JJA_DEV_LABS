name: Deploy to OVH

# Flux complet :
#   1. Push sur master
#   2. GitHub Actions lance les validations (lint, PHPStan)
#   3. Si tout passe → connexion SSH au serveur OVH
#   4. Exécution de scripts/deploy.sh sur le serveur
#
# Secrets GitHub requis :
#   OVH_SSH_HOST  — adresse SSH du serveur OVH
#   OVH_SSH_USER  — utilisateur SSH
#   OVH_SSH_KEY   — clé privée SSH (ed25519 ou RSA)
#   OVH_DEPLOY_PATH — chemin absolu du projet sur le serveur

on:
  push:
    branches:
      - master

env:
  DB_USER: ci
  DB_PASSWORD: ci
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_NAME: ci_db
  DB_VERSION: mariadb-10.11.2

jobs:
  pre-deploy-check:
    name: Pre-deploy validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl-icu, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint Twig
        run: php bin/console lint:twig templates/ --env=dev

      - name: Lint Container
        run: php bin/console lint:container --env=dev

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  deploy:
    name: Deploy to OVH via SSH
    needs: pre-deploy-check
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_SSH_HOST }}
          username: ${{ secrets.OVH_SSH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cd ${{ secrets.OVH_DEPLOY_PATH }}
            bash scripts/deploy.sh
