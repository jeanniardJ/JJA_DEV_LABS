<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJA DEV LAB | TERMINAL D'ACCÈS</title>
    
    <!-- Polices de caractères -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lab: {
                            bg: '#05070a',      // Fond ultra-sombre
                            panel: '#0b0f14',   // Fond des panneaux
                            border: '#1a2332',  // Bordures techniques
                            primary: '#00c6ff', // Bleu Cyber
                            cyan: '#4df4ff',    // Accent lumineux
                            terminal: '#00ff88',// Vert Succès
                            danger: '#ff3366',  // Rouge Alerte
                            text: '#cbd5e1',    // Texte principal
                            muted: '#64748b'    // Texte secondaire
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'blink': 'blink 1s step-end infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blink: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0' } },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Icônes : Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Styles globaux pour l'esthétique du laboratoire */
        body {
            background-color: #05070a;
            color: #cbd5e1;
            overflow: hidden;
        }

        /* Effet d'incrustation CRT (lignes de balayage) */
        .crt-overlay {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            opacity: 0.2;
        }

        /* Grille de fond technique */
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(30, 41, 59, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(30, 41, 59, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        /* Panneau en verre dépoli avec lueur */
        .auth-card {
            background: rgba(11, 15, 20, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 198, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .input-lab {
            background: rgba(5, 7, 10, 0.8);
            border: 1px solid #1a2332;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-lab:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.15);
            outline: none;
        }

        .tab-active {
            color: #00c6ff;
            border-bottom: 2px solid #00c6ff;
        }
    </style>
</head>
<body class="antialiased font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Couches d'effets visuels -->
    <div class="crt-overlay"></div>
    <div class="fixed inset-0 grid-bg -z-10"></div>

    <!-- Carte d'authentification principale -->
    <main class="auth-card w-full max-w-[420px] rounded-sm p-8 relative overflow-hidden animate-float">
        
        <!-- Ornement d'angle décoratif -->
        <div class="absolute top-0 right-0 w-16 h-16 pointer-events-none opacity-20">
            <div class="absolute top-0 right-0 w-full h-[2px] bg-lab-primary"></div>
            <div class="absolute top-0 right-0 w-[2px] h-full bg-lab-primary"></div>
        </div>

        <!-- En-tête : Logo et Titre -->
        <div class="flex flex-col items-center mb-10">
            <div class="w-12 h-12 bg-lab-primary/10 border border-lab-primary flex items-center justify-center mb-4">
                <i data-lucide="shield-check" class="w-6 h-6 text-lab-primary"></i>
            </div>
            <h1 class="font-bold tracking-[0.2em] text-white text-lg uppercase">TERMINAL JJA ACCESS</h1>
            <div class="flex items-center gap-2 mt-2">
                <span class="w-1.5 h-1.5 bg-lab-terminal rounded-full animate-pulse"></span>
                <span class="text-[10px] font-mono text-lab-terminal uppercase tracking-widest">Protocole de Sécurité v4.2</span>
            </div>
        </div>

        <!-- Sélecteur d'onglets : Connexion vs Inscription -->
        <div class="flex border-b border-lab-border mb-8 font-mono text-xs uppercase tracking-widest">
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-3 transition-colors tab-active">Connexion</button>
            <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-3 transition-colors text-lab-muted hover:text-lab-text">Inscription</button>
        </div>

        <!-- Conteneur des formulaires -->
        <div id="auth-form-container">
            
            <!-- Formulaire de Connexion -->
            <form id="form-login" class="space-y-6" onsubmit="event.preventDefault(); showLoading('Initialisation de la session...');">
                <div class="space-y-2">
                    <label class="font-mono text-[10px] text-lab-muted uppercase tracking-widest ml-1">Identifiant Système (Email)</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-lab-muted"></i>
                        <input type="email" placeholder="identite@lab.net" class="input-lab w-full pl-10 pr-4 py-3 text-sm font-mono text-lab-terminal placeholder:opacity-30" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="font-mono text-[10px] text-lab-muted uppercase tracking-widest">Clé de Sécurité</label>
                        <a href="#" class="text-[9px] text-lab-primary hover:underline uppercase tracking-tighter">Clé oubliée ?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="key" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-lab-muted"></i>
                        <input type="password" placeholder="••••••••••••" class="input-lab w-full pl-10 pr-4 py-3 text-sm font-mono text-lab-terminal" required>
                    </div>
                </div>

                <div class="flex items-center gap-2 px-1">
                    <input type="checkbox" id="remember" class="accent-lab-primary bg-black border-lab-border rounded-sm w-4 h-4">
                    <label for="remember" class="text-[10px] text-lab-muted font-mono uppercase tracking-tighter cursor-pointer">Maintenir la session active</label>
                </div>

                <button type="submit" class="w-full py-4 bg-lab-primary text-black font-mono font-black uppercase text-xs tracking-[0.2em] hover:bg-lab-cyan transition-all shadow-lg shadow-lab-primary/20 flex items-center justify-center gap-2">
                    <i data-lucide="terminal" class="w-4 h-4"></i> EXECUTE_LOGIN
                </button>
            </form>

            <!-- Formulaire d'Inscription (Masqué par défaut) -->
            <form id="form-register" class="space-y-6 hidden" onsubmit="event.preventDefault(); showLoading('Création du profil noyau...');">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="font-mono text-[10px] text-lab-muted uppercase tracking-widest ml-1">Prénom</label>
                        <input type="text" placeholder="Admin" class="input-lab w-full px-4 py-3 text-sm font-mono text-lab-terminal placeholder:opacity-30" required>
                    </div>
                    <div class="space-y-2">
                        <label class="font-mono text-[10px] text-lab-muted uppercase tracking-widest ml-1">Nom</label>
                        <input type="text" placeholder="User" class="input-lab w-full px-4 py-3 text-sm font-mono text-lab-terminal placeholder:opacity-30" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="font-mono text-[10px] text-lab-muted uppercase tracking-widest ml-1">Nouvel ID Système</label>
                    <input type="email" placeholder="identite@lab.net" class="input-lab w-full px-4 py-3 text-sm font-mono text-lab-terminal placeholder:opacity-30" required>
                </div>

                <div class="space-y-2">
                    <label class="font-mono text-[10px] text-lab-muted uppercase tracking-widest ml-1">Définir une Clé de Sécurité</label>
                    <input type="password" placeholder="••••••••••••" class="input-lab w-full px-4 py-3 text-sm font-mono text-lab-terminal" required>
                </div>

                <p class="text-[9px] text-lab-muted font-mono leading-relaxed px-1">
                    En créant une identité, vous acceptez les <span class="text-lab-primary underline">Protocoles du Lab</span> et les règles de sécurité du kernel.
                </p>

                <button type="submit" class="w-full py-4 bg-lab-terminal text-black font-mono font-black uppercase text-xs tracking-[0.2em] hover:bg-white transition-all shadow-lg shadow-lab-terminal/20 flex items-center justify-center gap-2">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> CREATE_IDENTITY
                </button>
            </form>
        </div>

        <!-- Overlay de statut (Chargement) -->
        <div id="status-overlay" class="absolute inset-0 bg-lab-bg/95 flex flex-col items-center justify-center z-[70] hidden font-mono">
            <div class="w-12 h-12 border-2 border-lab-primary border-t-transparent rounded-full animate-spin mb-4"></div>
            <div id="status-text" class="text-xs text-lab-primary uppercase tracking-widest text-center px-6">Traitement en cours...</div>
            <div class="mt-8 text-[8px] text-lab-muted uppercase tracking-[0.4em] animate-pulse">Syncing with Mainframe</div>
        </div>
    </main>

    <!-- Pied de page technique -->
    <footer class="fixed bottom-6 left-0 w-full flex flex-col items-center gap-4 pointer-events-none z-30">
        <div class="flex gap-10 opacity-30 text-lab-muted font-mono text-[10px] uppercase tracking-[0.4em]">
            <span>Connexion Chiffrée : TLS 1.3</span>
            <span class="hidden md:block">Noeud : JJA_ALPHA_01</span>
            <span>Auth : AES-256</span>
        </div>
    </footer>

    <!-- Logique d'interaction -->
    <script>
        // Initialisation des icônes Lucide
        lucide.createIcons();

        /**
         * Bascule entre les vues Connexion et Inscription
         */
        function switchTab(mode) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.classList.add('tab-active');
                tabLogin.classList.remove('text-lab-muted');
                tabRegister.classList.remove('tab-active');
                tabRegister.classList.add('text-lab-muted');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.classList.add('tab-active');
                tabRegister.classList.remove('text-lab-muted');
                tabLogin.classList.remove('tab-active');
                tabLogin.classList.add('text-lab-muted');
            }
        }

        /**
         * Affiche l'animation de chargement
         */
        function showLoading(text) {
            const overlay = document.getElementById('status-overlay');
            const statusText = document.getElementById('status-text');
            
            overlay.classList.remove('hidden');
            statusText.innerText = text;

            // Simulation de délai de traitement système
            setTimeout(() => {
                overlay.classList.add('hidden');
                // Optionnel : Redirection après succès
                // window.location.href = 'index.html';
            }, 3000);
        }
    </script>
</body>
</html>
